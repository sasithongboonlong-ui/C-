<!-- generated HTML -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Absolute Dashboard | SCGC</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003566; --accent: #ffc300; --danger: #d90429; --success: #28a745; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1440px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 26px; font-weight: bold; }
        .btn-toggle { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        .box { padding: 20px; border-radius: 12px; background: white; border: 1px solid rgba(0,0,0,0.05); }
        .alert-box { background: #fff5f5; border: 1px solid #ffcccc; }
        .analysis-box { background: #ebf8ff; border: 1px solid #bee3f8; }
        .btn-remind { background: var(--danger); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .table-container { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1500px; }
        th { background: #fff; color: var(--primary); padding: 15px 10px; border-bottom: 2px solid var(--primary); font-weight: bold; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        td:first-child { text-align: left; font-weight: bold; background: #fff; position: sticky; left: 0; z-index: 10; border-right: 2px solid #edf2f7; min-width: 180px; }
        .perc-col { background: #fffdf2; font-weight: bold; font-size: 11px; }
        .up { color: var(--danger); }
        .down { color: var(--success); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Production Absolute <span id="asOfDate" style="font-size: 14px; color: #666; font-weight: normal; margin-left: 10px;"></span></h1>
        <button class="btn-toggle" onclick="toggleAnalysis()">📊 สลับโหมดวิเคราะห์ %</button>
    </div>

    <div class="summary-grid">
        <div class="box alert-box">
            <div style="font-weight:bold; color:var(--danger); margin-bottom:10px;">🚨 แจ้งเตือน: ยังไม่กรอกข้อมูล (เกินวันที่ 15)</div>
            <div id="missingList" style="font-size: 14px; color: #742a2a;">กำลังโหลดข้อมูลบริษัท...</div>
            <button class="btn-remind" onclick="sendEmail()">📧 แจ้งเตือนการกรอกข้อมูล (sasithbo@scg.com)</button>
        </div>
        <div class="box analysis-box">
            <div style="font-weight:bold; color:#2b6cb0; margin-bottom:10px;">🔍 วิเคราะห์การเปลี่ยนแปลง (MoM Analysis)</div>
            <ul id="analysisList" style="font-size:13px; color:#2c5282; padding-left:20px; line-height:1.6;"></ul>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead id="tableHead"></thead>
            <tbody id="tbodyData"></tbody>
        </table>
    </div>
</div>

<script>
    // แก้ไขชื่อไฟล์ให้ตรงกับ GitHub ของคุณ
    const fileName = "Envi Dashboard 2026.xlsx"; 
    
    const targetCompanies = ["MOC", "ROC", "Olefins", "TPC RY", "TPE", "NPI RY", "NPI SB", "SCGC ICO", "Cirplas", "Teamplas", "TMMA", "GSC", "STC", "TMFC", "Chemtech", "TPC Indo", "TPC Vina", "Viet-Thai", "BMP", "NPIC", "NBM", "BNI", "Sirplaste", "LSP - Up", "LSP - Poly", "LSP Complex", "GNM", "NPI Group"];
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    let missingComps = [];

    async function init() {
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("File not found");
            const data = await res.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            process(rows);
            document.getElementById('asOfDate').innerText = "อัปเดต: " + new Date().toLocaleDateString('th-TH');
        } catch (e) {
            document.getElementById('missingList').innerHTML = "❌ ไม่สามารถโหลดไฟล์ " + fileName + " ได้";
        }
    }

    function process(rows) {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        let hHtml = "<tr><th>Company Name</th>";
        months.forEach((m, i) => {
            hHtml += `<th>${m}</th>`;
            if (i < 11) hHtml += `<th class="perc-col">${m}-${months[i+1]}%</th>`;
        });
        thead.innerHTML = hHtml + "</tr>";

        tbody.innerHTML = '';
        missingComps = [];
        let stats = [];

        targetCompanies.forEach(comp => {
            const row = rows.find(r => r[0] && String(r[0]).trim() === comp);
            if (!row) return;

            // คอลัมน์ Jan เริ่มที่ index 2
            let rowHtml = `<td>${comp}</td>`;
            for (let m = 0; m < 12; m++) {
                const val = row[m + 2] ? parseFloat(row[m + 2]) : null;
                rowHtml += `<td>${val !== null ? val.toLocaleString() : '-'}</td>`;

                if (m < 11) {
                    const nxt = row[m + 3] ? parseFloat(row[m + 3]) : null;
                    let p = '-';
                    if (val && nxt) {
                        const d = ((nxt - val) / val) * 100;
                        p = `<span class="${d>=0?'up':'down'}">${d>=0?'+':''}${d.toFixed(1)}%</span>`;
                        if (m === 2) stats.push({n: comp, d: d}); // วิเคราะห์ Mar-Apr
                    }
                    rowHtml += `<td class="perc-col">${p}</td>`;
                }
                if (m === 3 && !val) missingComps.push(comp);
            }
            tbody.innerHTML += `<tr>${rowHtml}</tr>`;
        });

        document.getElementById('missingList').innerText = "ค้างส่งเมษายน: " + (missingComps.length ? missingComps.join(", ") : "ส่งครบถ้วน");
        if(stats.length) {
            stats.sort((a,b) => a.d - b.d);
            document.getElementById('analysisList').innerHTML = `
                <li><strong>${stats[0].n}:</strong> ผันผวนที่สุด ลดลง ${stats[0].d.toFixed(1)}%</li>
                <li><strong>${stats[stats.length-1].n}:</strong> เติบโตสูงสุด +${stats[stats.length-1].d.toFixed(1)}%</li>`;
        }
    }

    function sendEmail() {
        if(!missingComps.length) return alert("ครบถ้วนแล้ว");
        window.location.href = `mailto:sasithbo@scg.com?subject=Reminder&body=ค้างส่งเมษายน: ${missingComps.join(", ")}`;
    }

    function toggleAnalysis() {
        const cols = document.querySelectorAll('.perc-col');
        cols.forEach(c => c.classList.toggle('hidden'));
    }

    init();
</script>
</body>
</html>
