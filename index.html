<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { background: #003566; color: white; padding: 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 0 0 10px 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: #00509d; color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #edf2f4; font-size: 15px; }
        tr:hover { background-color: #f8f9fa; }

        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-decoration: none; display: inline-block; }
        .follow-up { background: #ff4d4d; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .follow-up:hover { background: #d90429; transform: scale(1.05); }
        .completed { background: #e9f7ef; color: #27ae60; }

        .percent-up { color: #d90429; font-weight: bold; }
        .percent-down { color: #2ecc71; font-weight: bold; }
        .no-data { color: #adb5bd; font-style: italic; }

        .loading-screen { text-align: center; padding: 50px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📊 Production Monitoring (Monthly Analysis)</h2>
        <div id="updateDate" style="font-size: 12px;">Data loading...</div>
    </div>
    
    <div id="loading" class="loading-screen">กำลังดึงข้อมูลจากไฟล์ Excel...</div>

    <table id="prodTable" style="display:none;">
        <thead>
            <tr>
                <th>Company</th>
                <th>เดือนที่แล้ว (Last Month)</th>
                <th>เดือนปัจจุบัน (Current)</th>
                <th>การเปลี่ยนแปลง (%MoM)</th>
                <th>สถานะ / การดำเนินการ</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- ข้อมูลจะโหลดลงที่นี่ -->
        </tbody>
    </table>
</div>

<script>
    const fileName = "Envi Dashboard 2026.xlsx";

    async function loadProductionData() {
        try {
            const response = await fetch(fileName);
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('prodTable').style.display = 'table';
            document.getElementById('updateDate').innerText = "อัปเดตล่าสุด: " + new Date().toLocaleDateString('th-TH');

            renderTable(json);
        } catch (err) {
            document.getElementById('loading').innerHTML = "❌ ไม่สามารถโหลดไฟล์ Excel ได้ (ตรวจสอบชื่อไฟล์หรือการอัปโหลด)";
            console.error(err);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach(row => {
            // ดึงข้อมูลจากคอลัมน์ (ปรับชื่อคอลัมน์ให้ตรงกับ Excel ของคุณที่นี่)
            const company = row['Company'] || 'ไม่ระบุชื่อ';
            const current = parseFloat(row['Current_Month']);
            const last = parseFloat(row['Last_Month']);
            
            let momHtml = '';
            let actionHtml = '';

            // ตรวจสอบว่ากรอกข้อมูลหรือยัง
            if (isNaN(current) || current === 0) {
                momHtml = '<span class="no-data">ยังไม่มีข้อมูล</span>';
                actionHtml = '<button class="status-badge follow-up" onclick="alert(\'ส่งคำแจ้งเตือนไปยัง ' + company + ' เรียบร้อยแล้ว\')">🔔 ติดตาม (Follow Up)</button>';
            } else {
                // คำนวณ % MoM
                const diff = ((current - last) / last) * 100;
                const diffDisplay = isFinite(diff) ? (diff > 0 ? '+' : '') + diff.toFixed(1) + '%' : 'N/A';
                const diffClass = diff > 0 ? 'percent-up' : 'percent-down';
                
                momHtml = `<span class="${diffClass}">${diffDisplay}</span>`;
                actionHtml = '<span class="status-badge completed">✅ กรอกแล้ว</span>';
            }

            tbody.innerHTML += `
                <tr>
                    <td><strong>${company}</strong></td>
                    <td>${isNaN(last) ? '-' : last.toLocaleString()}</td>
                    <td>${isNaN(current) ? '-' : current.toLocaleString()}</td>
                    <td>${momHtml}</td>
                    <td>${actionHtml}</td>
                </tr>
            `;
        });
    }

    loadProductionData();
</script>

</body>
</html>
