<!-- generated HTML -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Monitoring Full Year 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #003566; color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .controls { padding: 15px 25px; background: #e9ecef; border-bottom: 1px solid #dee2e6; display: flex; align-items: center; gap: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #00509d; color: white; padding: 12px 8px; text-align: center; border: 1px solid #003f7d; }
        td { padding: 10px 8px; border: 1px solid #dee2e6; text-align: right; }
        td:first-child { text-align: left; font-weight: bold; background: #f8f9fa; position: sticky; left: 0; }
        
        .status-badge { padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; border: none; }
        .follow-up { background: #ff4d4d; color: white; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .mom-val { display: block; font-size: 10px; margin-top: 4px; }
        .up { color: #d90429; }
        .down { color: #2ecc71; }
        
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; }
        .btn-calc { background: #ffc300; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-calc:hover { background: #ffd60a; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">🏗️ Production Monitoring System (Full Year)</h2>
        <div id="dateNow"></div>
    </div>

    <div class="controls">
        <span>เทียบข้อมูล % MoM เดือน:</span>
        <select id="monthSelect">
            <option value="2">Feb vs Jan</option>
            <option value="3">Mar vs Feb</option>
            <option value="4">Apr vs Mar</option>
            <option value="5">May vs Apr</option>
            <option value="6">Jun vs May</option>
            <option value="7">Jul vs Jun</option>
            <option value="8">Aug vs Jul</option>
            <option value="9">Sep vs Aug</option>
            <option value="10">Oct vs Sep</option>
            <option value="11">Nov vs Oct</option>
            <option value="12">Dec vs Nov</option>
        </select>
        <button class="btn-calc" onclick="loadAndRender()">คำนวณการเปลี่ยนแปลง</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th style="min-width: 120px;">Company</th>
                    <th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th><th>May</th><th>Jun</th>
                    <th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
                    <th style="background: #ffc300; color: black; min-width: 100px;">สถานะล่าสุด</th>
                </tr>
            </thead>
            <tbody id="mainBody">
                <!-- ข้อมูลจะโหลดที่นี่ -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const fileName = "Envi Dashboard 2026.xlsx";
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    async function loadAndRender() {
        try {
            const response = await fetch(fileName);
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            
            const selectedMonthIdx = parseInt(document.getElementById('monthSelect').value);
            const tbody = document.getElementById('mainBody');
            tbody.innerHTML = '';
            
            // ข้ามหัวตาราง วนลูปรายบริษัท
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row[0]) continue;

                let rowHtml = `<td>${row[0]}</td>`;
                let lastValidMonthIdx = 0;

                // วนลูปข้อมูล 12 เดือน (คอลัมน์ B-M คือ index 1-12)
                for (let m = 1; m <= 12; m++) {
                    const val = row[m];
                    const isCurrentSelection = (m === selectedMonthIdx);
                    let cellStyle = isCurrentSelection ? 'background: #fff9db;' : '';
                    
                    let cellContent = (val !== undefined && val !== null) ? parseFloat(val).toLocaleString() : '-';
                    
                    // คำนวณ MoM ถ้าเลือกเดือนนี้
                    if (isCurrentSelection) {
                        const currentVal = parseFloat(row[m]);
                        const prevVal = parseFloat(row[m-1]);
                        if (!isNaN(currentVal) && !isNaN(prevVal) && prevVal !== 0) {
                            const diff = ((currentVal - prevVal) / prevVal) * 100;
                            const diffClass = diff >= 0 ? 'up' : 'down';
                            cellContent += `<span class="mom-val ${diffClass}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
                        }
                    }

                    rowHtml += `<td style="${cellStyle}">${cellContent}</td>`;
                    if (val !== undefined && val !== null) lastValidMonthIdx = m;
                }

                // ตรวจสอบสถานะ (ดูจากเดือนปัจจุบัน - สมมติคือเดือน 5 พฤษภาคม)
                // ถ้าเดือนล่าสุดที่กรอก ยังไม่ถึงเดือนปัจจุบัน ให้ขึ้น Follow Up
                const currentSystemMonth = new Date().getMonth() + 1; 
                let statusHtml = '';
                if (lastValidMonthIdx < currentSystemMonth) {
                    statusHtml = `<button class="status-badge follow-up">🔔 ตามข้อมูล</button>`;
                } else {
                    statusHtml = `<span class="status-badge completed" style="background:#d4edda; color:#155724;">✅ เรียบร้อย</span>`;
                }

                tbody.innerHTML += `<tr>${rowHtml}<td>${statusHtml}</td></tr>`;
            }
            document.getElementById('dateNow').innerText = "ข้อมูล ณ วันที่: " + new Date().toLocaleDateString('th-TH');
        } catch (e) {
            console.error(e);
            alert("ไม่สามารถโหลดไฟล์ Excel ได้ โปรดตรวจสอบชื่อไฟล์ใน GitHub");
        }
    }

    window.onload = loadAndRender;
</script>
</body>
</html>
