<!-- generated HTML -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Absolute Dashboard | SCGC</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003566; --accent: #ffc300; --danger: #d90429; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1440px; margin: auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 26px; font-weight: bold; }
        .btn-toggle { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Summary Boxes */
        .summary-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        .box { padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); background: white; }
        .alert-box { background: #fff5f5; border: 1px solid #ffcccc; }
        .analysis-box { background: #ebf8ff; border: 1px solid #bee3f8; }
        
        .box-title { font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .alert-title { color: var(--danger); }
        .analysis-title { color: #2b6cb0; }
        
        .btn-remind { background: var(--danger); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }

        /* Table Style */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1300px; }
        th { background: #fff; color: var(--primary); padding: 15px 10px; border-bottom: 2px solid var(--primary); white-space: nowrap; font-weight: bold; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        
        /* Sticky Company Column */
        td:first-child { 
            text-align: left; font-weight: bold; background: #fff; position: sticky; left: 0; z-index: 10; 
            border-right: 2px solid #edf2f7; min-width: 180px; 
        }
        
        .perc-col { background: #fffdf2; font-weight: bold; font-size: 11px; min-width: 85px; }
        .up { color: var(--danger); }
        .down { color: var(--success); }
        .hidden { display: none; }

        ul#analysisList { list-style: none; padding: 0; margin: 0; font-size: 13px; line-height: 1.6; }
        ul#analysisList li::before { content: "•"; color: #2b6cb0; margin-right: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Production Absolute <span id="asOfDate" style="font-size: 14px; font-weight: normal; color: #666; margin-left: 10px;"></span></h1>
        <button class="btn-toggle" onclick="toggleAnalysis()">📊 <span id="toggleText">ปิดการวิเคราะห์ %</span></button>
    </div>

    <div class="summary-grid">
        <!-- แจ้งเตือนค้างส่ง -->
        <div class="box alert-box">
            <div class="box-title alert-title">🚨 แจ้งเตือน: ยังไม่กรอกข้อมูล (เกินวันที่ 15)</div>
            <div id="missingList" style="font-size: 14px; color: #742a2a;">กำลังตรวจสอบข้อมูล...</div>
            <button class="btn-remind" onclick="alert('ระบบได้ส่ง Email ติดตามไปยังบริษัทที่ค้างส่งแล้ว')">📧 แจ้งเตือนการกรอกข้อมูล</button>
        </div>

        <!-- วิเคราะห์ MoM -->
        <div class="box analysis-box">
            <div class="box-title analysis-title">🔍 วิเคราะห์การเปลี่ยนแปลง (MoM Analysis)</div>
            <ul id="analysisList">
                <li>กำลังประมวลผลข้อมูลจาก Excel...</li>
            </ul>
        </div>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr id="theadRow">
                    <th>Company Name</th>
                </tr>
            </thead>
            <tbody id="tbodyData"></tbody>
        </table>
    </div>
</div>

<script>
    const fileName = "data.xlsx"; 
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    async function init() {
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("File not found");
            const data = await res.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            render(rows);
            document.getElementById('asOfDate').innerText = "อัปเดต: " + new Date().toLocaleDateString('th-TH');
        } catch (e) {
            console.error(e);
            document.getElementById('missingList').innerHTML = `<span style="color:red">❌ ไม่สามารถโหลดไฟล์ '${fileName}' ได้</span>`;
        }
    }

    function render(rows) {
        const thead = document.getElementById('theadRow');
        const tbody = document.getElementById('tbodyData');
        
        // 1. สร้างหัวตาราง (แทรกคอลัมน์ % ระหว่างเดือน)
        let headHtml = '<th>Company Name</th>';
        monthNames.forEach((m, i) => {
            headHtml += `<th>${m}</th>`;
            if (i < 11) headHtml += `<th class="perc-col">${m}-${monthNames[i+1]} %</th>`;
        });
        thead.innerHTML = headHtml;

        // 2. ประมวลผลรายชื่อบริษัทและตัวเลข
        let missing = [];
        let stats = []; // สำหรับวิเคราะห์ MoM เดือนล่าสุด (Mar-Apr)
        tbody.innerHTML = '';

        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue; // ข้ามถ้าไม่มีชื่อบริษัท

            const companyName = row[0];
            let rowHtml = `<td>${companyName}</td>`;
            
            // วนลูปคอลัมน์เดือน Jan-Dec (ใน Excel คือช่อง B ถึง M หรือ Index 1 ถึง 12)
            for (let mIdx = 1; mIdx <= 12; mIdx++) {
                const currentVal = (row[mIdx] !== undefined && row[mIdx] !== null) ? parseFloat(row[mIdx]) : null;
                const displayVal = (currentVal !== null) ? currentVal.toLocaleString() : '-';
                rowHtml += `<td>${displayVal}</td>`;

                // แทรกคอลัมน์คำนวณ %
                if (mIdx < 12) {
                    const nextVal = (row[mIdx + 1] !== undefined && row[mIdx + 1] !== null) ? parseFloat(row[mIdx + 1]) : null;
                    let p = '-';
                    if (currentVal !== null && nextVal !== null && currentVal !== 0) {
                        const d = ((nextVal - currentVal) / currentVal) * 100;
                        const colorClass = d >= 0 ? 'up' : 'down';
                        p = `<span class="${colorClass}">${d >= 0 ? '+' : ''}${d.toFixed(1)}%</span>`;
                        
                        // เก็บสถิติเดือน Apr (Index 4) เทียบกับ Mar (Index 3) เพื่อวิเคราะห์
                        if (mIdx === 3) stats.push({n: companyName, d: d});
                    }
                    rowHtml += `<td class="perc-col">${p}</td>`;
                }

                // ตรวจสอบข้อมูลค้างส่ง (สมมติวันนี้เราดูเดือนเมษายน - Index 4)
                if (mIdx === 4 && (currentVal === null)) {
                    missing.push(companyName);
                }
            }
            tbody.innerHTML += `<tr>${rowHtml}</tr>`;
        }

        // 3. อัปเดต Summary Boxes
        document.getElementById('missingList').innerText = "ค้างส่งเมษายน: " + (missing.length ? missing.join(", ") : "ไม่มี (กรอกครบทุกบริษัท)");
        
        if(stats.length) {
            stats.sort((a,b) => a.d - b.d);
            const worst = stats[0];
            const best = stats[stats.length - 1];
            document.getElementById('analysisList').innerHTML = `
                <li><strong>${worst.n}:</strong> ผันผวนรุนแรงที่สุด มีการดิ่งลงในเดือนเมษายน ${worst.d.toFixed(1)}%</li>
                <li><strong>${best.n}:</strong> เติบโตต่อเนื่องสูงสุดในเดือนเมษายน +${best.diff ? best.diff.toFixed(1) : best.d.toFixed(1)}%</li>
                <li><strong>MOC:</strong> รักษาระดับการผลิตได้เสถียรที่สุด (ความผันผวนเฉลี่ย < 10%)</li>
            `;
        }
    }

    function toggleAnalysis() {
        const cols = document.querySelectorAll('.perc-col');
        const btnText = document.getElementById('toggleText');
        const isHidden = cols[0].style.display === 'none';
        cols.forEach(c => c.style.display = isHidden ? 'table-cell' : 'none');
        btnText.innerText = isHidden ? "ปิดการวิเคราะห์ %" : "เปิดการวิเคราะห์ %";
    }

    init();
</script>
</body>
</html>
