<!-- generated HTML -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Absolute Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003566; --accent: #ffc300; --danger: #d90429; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .header span { font-size: 13px; color: #666; margin-left: 10px; }
        .btn-toggle { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Summary Boxes */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .alert-box { background: #fff5f5; border: 1px solid #fed7d7; }
        .analysis-box { background: #ebf8ff; border: 1px solid #bee3f8; }
        
        .box-title { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .alert-title { color: var(--danger); }
        .analysis-title { color: #2b6cb0; }
        
        .btn-remind { background: var(--danger); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Table */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fff; color: var(--primary); padding: 15px 10px; border-bottom: 2px solid var(--primary); white-space: nowrap; font-weight: 600; }
        td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        td:first-child { text-align: left; font-weight: 600; background: #fff; position: sticky; left: 0; z-index: 10; border-right: 2px solid #eee; min-width: 150px; }
        
        .perc-col { background: #fff9db; font-weight: 600; font-size: 11px; }
        .up { color: var(--danger); font-weight: bold; }
        .down { color: var(--success); font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Production Absolute <span id="asOfDate">อัปเดต: 18/05/2026</span></h1>
        <button class="btn-toggle" onclick="toggleAnalysis()">📊 <span id="toggleText">ปิดการวิเคราะห์ %</span></button>
    </div>

    <div class="summary-grid">
        <!-- Alert Box -->
        <div class="box alert-box">
            <div class="box-title alert-title">🚨 แจ้งเตือน: ยังไม่กรอกข้อมูล (เกินวันที่ 15)</div>
            <div id="missingList" style="font-size: 14px; color: #63171b;">ค้างส่งเมษายน: กำลังตรวจสอบ...</div>
            <button class="btn-remind">📧 แจ้งเตือนการกรอกข้อมูล</button>
        </div>

        <!-- Analysis Box -->
        <div class="box analysis-box">
            <div class="box-title analysis-title">🔍 วิเคราะห์การเปลี่ยนแปลง (MoM Analysis)</div>
            <ul id="analysisList" style="font-size: 13px; color: #2c5282; margin: 0; padding-left: 20px; line-height: 1.6;">
                <li>กำลังวิเคราะห์ข้อมูล...</li>
            </ul>
        </div>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr id="theadRow">
                    <th>Company Name</th>
                </tr>
            </thead>
            <tbody id="tbodyData"></tbody>
        </table>
    </div>
</div>

<script>
    // ตรวจสอบชื่อไฟล์ให้ตรงกับ GitHub
    const fileName = "Envi Dashboard 2026.xlsx"; 
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    let rawData = [];

    async function init() {
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("File not found");
            const data = await res.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            render();
            document.getElementById('asOfDate').innerText = "อัปเดต: " + new Date().toLocaleDateString('th-TH');
        } catch (e) {
            console.error(e);
            document.getElementById('missingList').innerHTML = "❌ หาไฟล์ '" + fileName + "' ไม่เจอใน GitHub ของคุณ";
        }
    }

    function render() {
        const thead = document.getElementById('theadRow');
        const tbody = document.getElementById('tbodyData');
        
        let headHtml = '<th>Company Name</th>';
        months.forEach((m, i) => {
            headHtml += `<th>${m}</th>`;
            if (i < 11) headHtml += `<th class="perc-col">${m}-${months[i+1]} %</th>`;
        });
        thead.innerHTML = headHtml;

        tbody.innerHTML = '';
        let missing = [];
        let growthStats = [];

        rawData.forEach(row => {
            let rowHtml = `<td>${row['Company'] || 'N/A'}</td>`;
            
            months.forEach((m, i) => {
                const currentVal = row[m] !== undefined ? parseFloat(row[m]) : null;
                rowHtml += `<td>${currentVal !== null ? currentVal.toLocaleString(undefined, {minimumFractionDigits: 0}) : '-'}</td>`;

                if (i < 11) {
                    const nextVal = row[months[i+1]] !== undefined ? parseFloat(row[months[i+1]]) : null;
                    let percHtml = '-';
                    if (currentVal !== null && nextVal !== null && currentVal !== 0) {
                        const diff = ((nextVal - currentVal) / currentVal) * 100;
                        const colorClass = diff >= 0 ? 'up' : 'down';
                        percHtml = `<span class="${colorClass}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
                        
                        // วิเคราะห์เดือนล่าสุด (สมมติว่าเป็นเดือน Apr เทียบกับ Mar)
                        if(i === 2) growthStats.push({ name: row['Company'], diff: diff });
                    }
                    rowHtml += `<td class="perc-col">${percHtml}</td>`;
                }

                // ตรวจสอบข้อมูลค้างส่ง (สมมติเดือนปัจจุบันคือ Apr)
                if (m === "Apr" && (currentVal === null || currentVal === 0)) {
                    missing.push(row['Company']);
                }
            });
            tbody.innerHTML += `<tr>${rowHtml}</tr>`;
        });

        document.getElementById('missingList').innerText = `ค้างส่งเมษายน: ${missing.length > 0 ? missing.join(', ') : 'ไม่มี'}`;
        
        if (growthStats.length > 0) {
            growthStats.sort((a, b) => b.diff - a.diff);
            const best = growthStats[0];
            const worst = growthStats[growthStats.length - 1];
            document.getElementById('analysisList').innerHTML = `
                <li><strong>${worst.name}:</strong> ผันผวนรุนแรงที่สุด มีการดิ่งลง ${worst.diff.toFixed(1)}%</li>
                <li><strong>${best.name}:</strong> เติบโตต่อเนื่องสูงสุด +${best.diff.toFixed(1)}%</li>
                <li><strong>เสถียรภาพ:</strong> ตรวจพบ ${growthStats.filter(s => Math.abs(s.diff) < 10).length} บริษัทที่มีความผันผวน < 10%</li>
            `;
        }
    }

    function toggleAnalysis() {
        const cols = document.querySelectorAll('.perc-col');
        const btnText = document.getElementById('toggleText');
        cols.forEach(c => c.style.display = (c.style.display === 'none' ? 'table-cell' : 'none'));
        btnText.innerText = (cols[0].style.display === 'none' ? "เปิดการวิเคราะห์ %" : "ปิดการวิเคราะห์ %");
    }

    init();
</script>

</body>
</html>
