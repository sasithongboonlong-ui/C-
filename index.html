<!-- generated HTML -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Absolute Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #003566; --accent: #ffc300; --danger: #d90429; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header & Toggle Button */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; font-weight: bold; }
        .btn-toggle { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-toggle:hover { background: #f0b700; }

        /* Alert & Analysis Boxes */
        .summary-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        .box { padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
        .alert-box { background: #fff5f5; border-color: #feb2b2; }
        .analysis-box { background: #ebf8ff; border-color: #bee3f8; }
        
        .box-title { font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .alert-title { color: var(--danger); }
        .analysis-title { color: #2b6cb0; }
        
        .btn-remind { background: var(--danger); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 14px; transition: 0.2s; }
        .btn-remind:hover { background: #b91c1c; }

        /* Table */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1300px; }
        th { background: #fff; color: var(--primary); padding: 15px 10px; border-bottom: 2px solid var(--primary); white-space: nowrap; font-weight: 700; text-align: center; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        
        /* Sticky Column */
        td:first-child { 
            text-align: left; font-weight: 600; background: #fff; position: sticky; left: 0; z-index: 10; 
            border-right: 2px solid #edf2f7; min-width: 160px;
        }
        tr:hover td { background-color: #f8fafc; }
        tr:hover td:first-child { background-color: #f8fafc; }
        
        .perc-col { background: #fffdf2; font-weight: bold; font-size: 11px; min-width: 85px; }
        .up { color: var(--danger); }
        .down { color: var(--success); }
        
        ul#analysisList { list-style: none; padding: 0; margin: 0; font-size: 13px; line-height: 1.6; }
        ul#analysisList li::before { content: "•"; color: #2b6cb0; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Production Absolute <span id="asOfDate" style="font-size: 14px; color: #666; font-weight: normal; margin-left: 10px;"></span></h1>
        <button class="btn-toggle" onclick="toggleAnalysis()">📊 <span id="toggleText">ปิดการวิเคราะห์ %</span></button>
    </div>

    <div class="summary-grid">
        <div class="box alert-box">
            <div class="box-title alert-title">🚨 แจ้งเตือน: ยังไม่กรอกข้อมูล (เกินวันที่ 15)</div>
            <div id="missingList" style="font-size: 14px; color: #742a2a;">กำลังตรวจสอบข้อมูลค้างส่ง...</div>
            <button class="btn-remind" onclick="alert('ส่ง Email ติดตามทุกบริษัทเรียบร้อยแล้ว')">📧 แจ้งเตือนการกรอกข้อมูล</button>
        </div>

        <div class="box analysis-box">
            <div class="box-title analysis-title">🔍 วิเคราะห์การเปลี่ยนแปลง (MoM Analysis)</div>
            <ul id="analysisList"></ul>
        </div>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr id="theadRow">
                    <th>Company Name</th>
                </tr>
            </thead>
            <tbody id="tbodyData"></tbody>
        </table>
    </div>
</div>

<script>
    const fileName = "data.xlsx"; 
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    async function init() {
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("File not found");
            const data = await res.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            // อ่านข้อมูลแบบ Array ของ Array เพื่อแก้ปัญหาชื่อหัวคอลัมน์ไม่ตรง
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            render(rows);
            document.getElementById('asOfDate').innerText = "อัปเดต: " + new Date().toLocaleDateString('th-TH');
        } catch (e) {
            document.getElementById('missingList').innerHTML = `<span style="color:red">❌ ไม่สามารถโหลดไฟล์ '${fileName}' ได้</span>`;
        }
    }

    function render(rows) {
        const thead = document.getElementById('theadRow');
        const tbody = document.getElementById('tbodyData');
        
        // 1. สร้างหัวตาราง (แทรกคอลัมน์ % ระหว่างเดือน)
        let headHtml = '<th>Company Name</th>';
        monthNames.forEach((m, i) => {
            headHtml += `<th>${m}</th>`;
            if (i < 11) headHtml += `<th class="perc-col">${m}-${monthNames[i+1]} %</th>`;
        });
        thead.innerHTML = headHtml;

        // 2. จัดการข้อมูลรายบริษัท
        let missing = [];
        let stats = [];
        tbody.innerHTML = '';

        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue; // ข้ามแถวที่ไม่มีชื่อบริษัท

            let rowHtml = `<td>${row[0]}</td>`;
            
            // วนลูปเดือน Jan (B) ถึง Dec (M) คือ Index 1 ถึง 12
            for (let mIdx = 1; mIdx <= 12; mIdx++) {
                const currentVal = row[mIdx] ? parseFloat(row[mIdx]) : null;
                rowHtml += `<td>${currentVal !== null ? currentVal.toLocaleString() : '-'}</td>`;

                if (mIdx < 12) {
                    const nextVal = row[mIdx + 1] ? parseFloat(row[mIdx + 1]) : null;
                    let p = '-';
                    if (currentVal && nextVal) {
                        const d = ((nextVal - currentVal) / currentVal) * 100;
                        p = `<span class="${d>=0?'up':'down'}">${d>=0?'+':''}${d.toFixed(1)}%</span>`;
                        // เก็บสถิติเดือนล่าสุด (สมมติเดือน 4 เทียบ 3)
                        if (mIdx === 3) stats.push({n: row[0], d: d});
                    }
                    rowHtml += `<td class="perc-col">${p}</td>`;
                }

                // เช็คค้างส่ง (สมมติเช็คเดือน Apr - Index 4)
                if (mIdx === 4 && !currentVal) missing.push(row[0]);
            }
            tbody.innerHTML += `<tr>${rowHtml}</tr>`;
        }

        // 3. อัปเดต Summary
        document.getElementById('missingList').innerText = "ค้างส่งเมษายน: " + (missing.length ? missing.join(", ") : "ส่งครบทุกบริษัท");
        if(stats.length) {
            stats.sort((a,b) => a.d - b.d);
            document.getElementById('analysisList').innerHTML = `
                <li><strong>${stats[0].n}:</strong> ผันผวนรุนแรงที่สุด ลดลง ${stats[0].d.toFixed(1)}%</li>
                <li><strong>${stats[stats.length-1].n}:</strong> เติบโตสูงสุด +${stats[stats.length-1].d.toFixed(1)}%</li>
                <li><strong>เสถียรภาพ:</strong> ตรวจพบกลุ่มที่มีความผันผวนต่ำ (< 10%) จำนวน ${stats.filter(s=>Math.abs(s.d)<10).length} บริษัท</li>`;
        }
    }

    function toggleAnalysis() {
        const cols = document.querySelectorAll('.perc-col');
        const isHidden = cols[0].style.display === 'none';
        cols.forEach(c => c.style.display = isHidden ? 'table-cell' : 'none');
        document.getElementById('toggleText').innerText = isHidden ? "ปิดการวิเคราะห์ %" : "เปิดการวิเคราะห์ %";
    }

    init();
</script>
</body>
</html>
